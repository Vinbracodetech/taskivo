<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- INSTANT SEO PAYLOAD FOR GOOGLEBOT -->
    <title>Taskivo — Digital Engagement Infrastructure</title>
    <meta name="description" content="The world's most secure omnichannel engagement infrastructure. Connecting businesses with verified human attention. We provide SEO Web Traffic, YouTube Social Engagement, Authentic UGC, and App QA Testing." />
    
    <!-- Open Graph for Link Sharing -->
    <meta property="og:title" content="Taskivo B2B Network" />
    <meta property="og:description" content="Secure omnichannel engagement infrastructure bridging global businesses with a distributed contributor network." />
    <meta property="og:url" content="https://taskivo.online/" />
    <meta property="og:type" content="website" />
    
    <!-- Preconnect to speed up font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Taskivo ServiceWorker registered successfully!');
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <!-- Fallback text purely for Googlebot indexing -->
    <noscript>
      <h1>Taskivo — Digital Engagement Infrastructure</h1>
      <p>The world's most secure omnichannel engagement infrastructure. Connecting businesses with verified human attention. We provide SEO Web Traffic, YouTube Social Engagement, Authentic UGC, and App QA Testing.</p>
    </noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
